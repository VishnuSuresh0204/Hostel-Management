{% extends 'GUEST/base.html' %}

{% block guest_content %}
<h2>My Feedback</h2>
<div class="row g-3">
    {% for feedback in feedbacks %}
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <p class="card-text">{{ feedback.message }}</p>
                <hr>
                <div class="d-flex justify-content-between align-items-center">
                    <p class="text-muted small mb-0">Submitted: {{ feedback.date|date:"M d, Y" }}</p>
                    <a href="/delete_feedback/{{ feedback.id }}/" 
                       class="text-danger small text-decoration-none"
                       onclick="return confirm('Delete this feedback?')">
                        Delete
                    </a>
                </div>
            </div>
        </div>
    </div>
    {% empty %}
    <div class="col-12">
        <p>You haven't submitted any feedback yet.</p>
        <a href="/guest_feedback/" class="btn btn-primary">Submit Feedback</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
