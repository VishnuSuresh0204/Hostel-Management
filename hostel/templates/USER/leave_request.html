{% extends 'USER/base.html' %}

{% block user_content %}
<h2>Submit Leave Request</h2>
<div class="card">
    <div class="card-body">
        <form method="POST" class="needs-validation" novalidate>
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Reason</label>
                <textarea name="reason" class="form-control" rows="3" minlength="10" required></textarea>
                <div class="invalid-feedback">
                    Please provide a reason (at least 10 characters).
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Start Date</label>
                    <input type="date" name="start_date" class="form-control" required id="startDate">
                    <div class="invalid-feedback">
                        Please select a start date.
                    </div>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">End Date</label>
                    <input type="date" name="end_date" class="form-control" required id="endDate">
                    <div class="invalid-feedback">
                        Please select an end date.
                    </div>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Submit Request</button>
            <a href="/my_leave_requests/" class="btn btn-secondary">View My Requests</a>
        </form>

    </div>
</div>
{% endblock %}
