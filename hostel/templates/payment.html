<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .payment-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #363636 100%);
            color: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
            min-height: 200px;
        }
        .chip {
            width: 50px;
            height: 35px;
            background: linear-gradient(135deg, #d4af37 0%, #f2d06b 100%);
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .card-number { font-size: 1.25rem; letter-spacing: 2px; font-family: 'Courier New', monospace; margin-bottom: 15px; }
        .card-label { font-size: 0.7rem; text-transform: uppercase; opacity: 0.8; margin-bottom: 2px; }
        .card-holder { font-size: 0.9rem; text-transform: uppercase; }
        .card-expiry { font-size: 0.9rem; }
        .payment-form-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            padding: 30px;
        }
    </style>
</head>
<body class="d-flex align-items-center min-vh-100">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 mb-4 mb-md-0">
            <!-- Visual Card -->
            <div class="payment-card mb-4">
                <div class="d-flex justify-content-between align-items-start">
                    <div class="chip"></div>
                    <span class="fs-5 fst-italic fw-bold">Bank</span>
                </div>
                <div class="card-number mt-3" id="display-card-number">#### #### #### ####</div>
                <div class="d-flex justify-content-between align-items-end mt-4">
                    <div>
                        <div class="card-label">Card Holder</div>
                        <div class="card-holder" id="display-card-holder">FULL NAME</div>
                    </div>
                    <div>
                        <div class="card-label">Expires</div>
                        <div class="card-expiry" id="display-expiry">MM/YY</div>
                    </div>
                </div>
            </div>
            
            <div class="alert alert-info shadow-sm">
                <h5 class="alert-heading fw-bold mb-1">Payment Details</h5>
                <hr class="my-2">
                <div class="d-flex justify-content-between">
                    <span>Amount to Pay:</span>
                    <span class="fw-bold fs-5">₹{{ amount }}</span>
                </div>
                <!-- Hidden inputs passed from view -->
            </div>
        </div>

        <div class="col-md-6">
            <div class="payment-form-card">
                <h3 class="mb-4 fw-bold text-dark">Enter Card Details</h3>
                
                <form method="POST" id="paymentForm" class="needs-validation" novalidate>
                    {% csrf_token %}
                    <!-- Context variables passed from view -->
                    <input type="hidden" name="type" value="{{ type }}">
                    <input type="hidden" name="id" value="{{ id }}">
                    <input type="hidden" name="amount" value="{{ amount }}">

                    <div class="mb-3">
                        <label class="form-label">Card Number</label>
                        <input type="text" class="form-control" id="cardNumber" maxlength="19" placeholder="xxxx xxxx xxxx xxxx" required>
                        <div class="invalid-feedback">Please enter a valid 16-digit card number.</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Cardholder Name</label>
                        <input type="text" class="form-control" id="cardName" placeholder="JOHN DOE" required>
                        <div class="invalid-feedback">Please enter the cardholder name.</div>
                    </div>

                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">Expiration Date</label>
                            <input type="text" class="form-control" id="cardExpiry" placeholder="MM/YY" maxlength="5" required pattern="(0[1-9]|1[0-2])\/([0-9]{2})">
                            <div class="invalid-feedback">Invalid expiry (MM/YY).</div>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">CVV</label>
                            <input type="password" class="form-control" id="cardCvv" maxlength="3" placeholder="123" required pattern="\d{3}">
                            <div class="invalid-feedback">Invalid CVV (3 digits).</div>
                        </div>
                    </div>

                    <div class="d-grid gap-2 mt-2">
                        <button type="submit" class="btn btn-primary btn-lg" id="payBtn">
                            Pay ₹{{ amount }} Now
                        </button>
                        <button type="button" class="btn btn-outline-secondary" onclick="window.history.back()">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Live update of card visual
    const cardNumberInput = document.getElementById('cardNumber');
    const cardNameInput = document.getElementById('cardName');
    const cardExpiryInput = document.getElementById('cardExpiry');
    
    const displayCardNumber = document.getElementById('display-card-number');
    const displayCardHolder = document.getElementById('display-card-holder');
    const displayExpiry = document.getElementById('display-expiry');

    cardNumberInput.addEventListener('input', function(e) {
        let value = e.target.value.replace(/\D/g, '').substring(0, 16);
        value = value != '' ? value.match(/.{1,4}/g).join(' ') : '';
        e.target.value = value;
        displayCardNumber.textContent = value || '#### #### #### ####';
    });

    cardNameInput.addEventListener('input', function(e) {
        displayCardHolder.textContent = e.target.value.toUpperCase() || 'FULL NAME';
    });

    cardExpiryInput.addEventListener('input', function(e) {
        let value = e.target.value.replace(/\D/g, '').substring(0, 4);
        if (value.length >= 3) {
            value = value.substring(0, 2) + '/' + value.substring(2, 4);
        }
        e.target.value = value;
        displayExpiry.textContent = value || 'MM/YY';
    });

    // Integrated Form Validation
    const form = document.getElementById('paymentForm');
    form.addEventListener('submit', function(e) {
        const number = cardNumberInput.value.replace(/\s/g, '');
        let customValid = true;

        if (number.length !== 16) {
            cardNumberInput.setCustomValidity('Card number must be 16 digits.');
            customValid = false;
        } else {
            cardNumberInput.setCustomValidity('');
        }

        if (!form.checkValidity() || !customValid) {
            e.preventDefault();
            e.stopPropagation();
        }
        
        form.classList.add('was-validated');
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
