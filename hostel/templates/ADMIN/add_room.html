{% extends 'ADMIN/base.html' %}

{% block title %}Add Room{% endblock %}

{% block admin_content %}
<div class="container d-flex justify-content-center" style="margin-top: 3rem;">
    <div class="card shadow p-4" style="width: 100%; max-width: 520px;">

        <h3 class="mb-4 text-center">Add New Room</h3>

        <form method="post" enctype="multipart/form-data" class="needs-validation" novalidate>
            {% csrf_token %}

            <div class="form-group mb-3">
                <label class="form-label">Room Number</label>
                <input type="text" name="number" class="form-control"
                       placeholder="e.g. A-101" required>
                <div class="invalid-feedback">
                    Please provide a room number.
                </div>
            </div>

            <div class="form-group mb-3">
                <label class="form-label">Capacity</label>
                <input type="number" name="capacity" class="form-control"
                       min="1" value="1" required>
                <div class="invalid-feedback">
                    Capacity must be at least 1.
                </div>
            </div>

            <div class="form-group mb-3">
                <label class="form-label">Price (₹)</label>
                <input type="number" step="0.01" name="price"
                       class="form-control" placeholder="Enter room price" required>
                <div class="invalid-feedback">
                    Please enter a valid price.
                </div>
            </div>

            <div class="form-group mb-3">
                <label class="form-label">Rental Type</label>
                <select name="rental_type" class="form-select" required>
                    <option value="MONTHLY">Monthly</option>
                    <option value="DAILY">Daily</option>
                </select>
            </div>

            <div class="form-group mb-4">
                <label class="form-label">Room Image</label>
                <input type="file" name="image" class="form-control">
                <small class="text-muted">Optional (JPG / PNG)</small>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Add Room
            </button>
        </form>


    </div>
</div>
{% endblock %}
